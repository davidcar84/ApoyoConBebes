<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sin conexión</title>
  <style>
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
           background:#eff6ff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    .box { background:#fff; border-radius:16px; padding:40px 32px; text-align:center;
           box-shadow:0 4px 24px rgba(37,99,235,.12); max-width:340px; }
    h1 { margin:0 0 8px; color:#2563eb; font-size:1.4rem; }
    p  { margin:0 0 24px; color:#64748b; }
    button { background:#2563eb; color:#fff; border:none; border-radius:10px;
             padding:10px 28px; font-size:.95rem; font-weight:600; cursor:pointer; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Sin conexión</h1>
    <p>Verifica tu red e intenta de nuevo.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>

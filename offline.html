<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — ApoyoConBebes</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f0f7ff; color: #0f172a; }
    .box { text-align: center; padding: 40px 24px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(37,99,235,0.1); max-width: 360px; }
    h1 { font-size: 1.4rem; margin: 0 0 8px; color: #2563eb; }
    p  { color: #475569; margin: 0 0 20px; font-size: 0.95rem; }
    button { background: #2563eb; color: white; border: none; border-radius: 10px; padding: 10px 24px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Sin conexión</h1>
    <p>No hay red disponible. Comprueba tu conexión e intenta de nuevo.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ApoyoConBebes - Colaborador</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1 class="app-title" id="collabTitle">Bienvenido</h1>
    </header>
    <div class="app-content" style="grid-template-columns: auto 1fr;">
      <!-- TABS -->
      <aside class="sidebar">
        <nav class="nav-sections" style="grid-auto-flow: row;">
          <button class="nav-link active" data-section="available">Disponible</button>
          <button class="nav-link" data-section="myturns">Mis turnos</button>
          <button class="nav-link" data-section="notifications">Notificaciones</button>
        </nav>
      </aside>

      <!-- CONTENT -->
      <main class="main-content">
        <!-- DISPONIBLE -->
        <section id="available" class="section active">
          <div class="section-header">
            <h2 class="section-title">Bloques disponibles</h2>
            <p class="section-description" id="collabSubtitle">Selecciona los turnos en los que puedas ayudar</p>
          </div>
          <div id="availableBlocks"></div>
        </section>

        <!-- MIS TURNOS -->
        <section id="myturns" class="section">
          <div class="section-header">
            <h2 class="section-title">Mis turnos</h2>
            <p class="section-description">Bloques en los que te apuntaste</p>
          </div>
          <div id="myTurnsBlocks"></div>
        </section>

        <!-- NOTIFICACIONES -->
        <section id="notifications" class="section">
          <div class="section-header">
            <h2 class="section-title">Notificaciones</h2>
            <p class="section-description">Respuestas de los papás</p>
          </div>
          <div id="notificationsList"></div>
        </section>
      </main>
    </div>
  </div>

  <div id="detailModal" class="hidden"></div>

  <script src="firebase.js"></script>
  <script src="colaborador.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    }
  </script>
</body>
</html>

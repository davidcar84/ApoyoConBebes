<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ApoyoConBebes - Colaborador</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div class="page-shell">
    <div id="errorPanel" class="error-panel hidden"></div>
    <header class="page-header" style="margin-bottom: 28px;">
      <div>
        <h1 id="collabTitle" style="margin-bottom: 6px;">👋 Bienvenido</h1>
        <p id="collabSubtitle" class="note">Tus bloques disponibles y turnos confirmados.</p>
      </div>
    </header>
    <div class="tabs" style="margin-bottom: 24px;">
      <button class="tab-button active" id="tabAvailableBtn">📋 Disponible <span class="badge" id="badgeAvailable">0</span></button>
      <button class="tab-button" id="tabMyTurnsBtn">✅ Mis turnos <span class="badge" id="badgeMyTurns">0</span></button>
      <button class="tab-button" id="tabNotificationsBtn">🔔 Notificaciones <span class="badge" id="badgeNotifications">0</span></button>
    </div>
    <div class="chip-bar" id="collabChips"></div>
    <main>
      <section class="card" id="availableSection"></section>
      <section class="card hidden" id="myTurnsSection"></section>
      <section class="card hidden" id="notificationsSection"></section>
    </main>
  </div>
  <div id="detailModal" class="hidden"></div>
  <script src="firebase.js"></script>
  <script src="colaborador.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    }
  </script>
</body>
</html>
